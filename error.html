<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍</title>
    <style>
        body {
            display: flex;
            justify-content: center; /* 水平居中 */
            align-items: center;    /* 垂直居中 */
            height: auto;          /* 设置页面高度为视口高度 */
            margin: 0;              /* 移除默认外边距 */
            background-color: #f0f0f0; /* 页面背景颜色 */
        }
        .centered-box {
            text-align: center;     /* 文本内容居中 */
            padding: 20px;          /* 内边距 */
            border-radius: 10px;    /* 圆角 */
            background-color: #d3d3d3; /* 灰色背景 */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* 添加轻微阴影效果 */
        }
        img {
            max-width: 50%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="centered-box">
        <h1>404 NOT FOUND</h1>
        <p>Q:为什么我会看见此页面?</p>
        <p>A:这是您尝试访问未开放界面或遭遇异常错误导致的</p>
        <p>Q:我如何回去?</p>
        <p>A：点击底部链接即可返回</p>
        <a href="index.html">重定向到网站主界面</a>
    </div>
</body>
</html>
